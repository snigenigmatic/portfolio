{{define "tag-subpage"}}
{{template "head" .}}
<body>
    {{template "header" .}}
    <main class="main-content">
        <article class="page-content">
            {{$PageData := .TemplateData}}
            <h1>{{$PageData.Frontmatter.Title}}</h1>
            <div class="post-list">
                {{range $url, $pages := .DeepDataMerge.Tags}}
                {{range $pages}}
                <div class="post-item">
                    <h3><a href="/{{.CompleteURL}}">{{.Frontmatter.Title}}</a></h3>
                </div>
                {{end}}
                {{end}}
            </div>
        </article>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
