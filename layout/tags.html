{{define "all-tags"}}
{{template "head" .}}
<body>
    {{template "header" .}}
    <main class="main-content">
        <article class="page-content">
            <h1>Tags</h1>
            <div class="tag-list">
                {{range .TagNames}}
                <a href="/tags/{{.}}.html" class="tag-chip">{{.}}</a>
                {{end}}
            </div>
        </article>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
