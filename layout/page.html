{{define "page"}}
{{template "head" .}}
<body>
    {{template "header" .}}
    <main class="main-content">
        {{$PageData := index .DeepDataMerge.Templates .PageURL}}
        {{if $PageData}}
        <article class="page-content">
            {{$PageData.Body}}
        </article>
        {{end}}
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
