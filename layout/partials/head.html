{{define "head"}}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{$PageData := index .DeepDataMerge.Templates .PageURL}}
    {{if $PageData}}
    <title>{{$PageData.Frontmatter.Title}} — C Kaustubh</title>
    <meta name="description" content="{{$PageData.Frontmatter.Description}}" />
    {{else}}
    <title>C Kaustubh</title>
    {{end}}
    <meta name="author" content="C Kaustubh" />
    <meta property="og:title" content="{{if $PageData}}{{$PageData.Frontmatter.Title}} — {{end}}C Kaustubh" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png?v=1" />
    <link rel="shortcut icon" href="/static/favicon.ico?v=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
{{end}}
