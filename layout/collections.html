{{define "all-collections"}}
{{template "head" .}}
<body>
    {{template "header" .}}
    <main class="main-content">
        <article class="page-content">
            <h1>Collections</h1>
            <div class="post-list">
                {{range $url, $collection := .DeepDataMerge.Collections}}
                <div class="post-item">
                    <h3><a href="/{{$url}}">{{$url}}</a></h3>
                </div>
                {{end}}
            </div>
        </article>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
